# Production override — aaPanel manages Nginx and SSL
# Only the Node.js signaling backend runs in Docker

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sochau-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: https://share.sochau.cloud
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
