# ─────────────────────────────────────────────────────────────────────────────
# Sochau Share — docker-compose.yml
#
# Services:
#   backend  — Node.js WebRTC signaling server  (port 3000, internal only)
#   frontend — Nginx serving static files       (port 80/443, public)
#
# Usage:
#   Development:  docker compose up --build
#   Production:   docker compose -f docker-compose.yml up -d --build
#
# Before first run:
#   1. Copy backend/.env.example → backend/.env and fill values
#   2. Provision TLS certs into ./certs/ (or use the Certbot companion)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════════
  # BACKEND — Node.js WebRTC signaling server
  # ══════════════════════════════════════════════════════════
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      # Pass build-time args if ever needed
      args:
        NODE_ENV: production

    container_name: sochau-backend

    restart: unless-stopped

    # Never expose 3000 to the host — only Nginx talks to it
    expose:
      - "3000"

    environment:
      NODE_ENV:   production
      PORT:       3000
      # CLIENT_URL must match the public domain Nginx serves
      CLIENT_URL: ${CLIENT_URL:-https://share.sochau.cloud}

    env_file:
      - ./backend/.env

    # Resource constraints — tune to your VPS size
    deploy:
      resources:
        limits:
          cpus:   "0.75"
          memory: "256M"
        reservations:
          cpus:   "0.10"
          memory: "64M"

    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s

    networks:
      - internal

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ══════════════════════════════════════════════════════════
  # FRONTEND — Nginx (static SPA + reverse proxy)
  # ══════════════════════════════════════════════════════════
  frontend:
    image: nginx:1.27-alpine
    container_name: sochau-frontend

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Static frontend files (built or raw)
      - ./frontend:/usr/share/nginx/html:ro

      # Nginx site config
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

      # TLS certificates (Let's Encrypt / Certbot)
      # Mount your certs here, or use the certbot companion service below
      - ./certs/letsencrypt:/etc/letsencrypt:ro

      # Certbot ACME challenge webroot
      - ./certs/certbot:/var/www/certbot:ro

      # Persist logs outside the container
      - nginx-logs:/var/log/nginx

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

    networks:
      - internal
      - public

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ════════════════════════════════════════
  # TURN SERVER — coturn for WebRTC relay
  # ════════════════════════════════════════
  turn:
    image: coturn/coturn:latest
    container_name: sochau-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════
  # CERTBOT — automatic TLS certificate renewal (optional)
  # Comment out if you manage certs manually or use Caddy.
  # ══════════════════════════════════════════════════════════
  certbot:
    image: certbot/certbot:latest
    container_name: sochau-certbot

    # Run renewal check every 12 h; Certbot only renews if < 30 days remain
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./certs/certbot:/var/www/certbot

    depends_on:
      - frontend

    networks:
      - public

    profiles:
      # Only start with: docker compose --profile certbot up
      - certbot

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Internal: backend ↔ frontend only — never exposed to host
  internal:
    driver: bridge
    internal: true

  # Public: frontend ↔ host (ports 80/443 bound above)
  public:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  nginx-logs:
    driver: local