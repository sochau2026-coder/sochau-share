<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Sochau Share — peer-to-peer encrypted file transfer. No server. No storage." />
  <title>Files Sharing — Sochau Share</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Ambient Background ── -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="grain"            aria-hidden="true"></div>

  <main class="layout">

    <!-- ══ HEADER ══ -->
    <header class="header">
      <div class="logo">
        <span class="logo__icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 1L20 6V16L11 21L2 16V6L11 1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M11 1V21M2 6L11 11L20 6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="logo__wordmark">Sochau<span class="logo__accent">Share</span></span>
      </div>
      <div class="e2e-badge" title="WebRTC DataChannel — files never touch a server">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <rect x="2" y="5" width="8" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4 5V3.5a2 2 0 0 1 4 0V5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        End-to-end encrypted
      </div>
    </header>

    <!-- ══ MAIN CARD ══ -->
    <div class="card" id="card">

      <!-- Room strip -->
      <div class="room-strip">
        <div class="room-strip__left">
          <span class="room-strip__label">Room</span>
          <span class="room-strip__id" id="room-id-display">—</span>
        </div>
        <button class="copy-btn" id="copy-btn" aria-label="Copy room link">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M3 10H2.5A1.5 1.5 0 0 1 1 8.5V2.5A1.5 1.5 0 0 1 2.5 1H8.5A1.5 1.5 0 0 1 10 2.5V3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="copy-label">Copy link</span>
        </button>
      </div>

      <!-- Connection status -->
      <div class="status-bar" id="status-bar" data-state="idle">
        <span class="status-bar__dot" aria-hidden="true"></span>
        <span class="status-bar__text" id="status-text">Initialising…</span>
        <span class="status-bar__peer" id="peer-info"></span>
      </div>

      <!-- Error banner (hidden by default) -->
      <div class="error-banner" id="error-banner" role="alert" hidden>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7.5 4v4M7.5 10.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span id="error-text">An error occurred.</span>
        <button class="error-banner__close" id="error-close" aria-label="Dismiss error">✕</button>
      </div>

      <!-- ── Drop Zone ── -->
      <div
        class="dropzone"
        id="dropzone"
        role="region"
        aria-label="Drop files here or click to browse"
        tabindex="0"
        aria-disabled="false"
      >
        <div class="dropzone__content">
          <div class="dropzone__ring" aria-hidden="true">
            <svg class="dropzone__icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18.5" stroke="currentColor" stroke-width="1" stroke-dasharray="3.5 3.5"/>
              <path d="M20 27V15M13 21l7-7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="dropzone__title">Drop files or folders</p>
          <p class="dropzone__sub">Files travel directly to your peer — nothing hits a server</p>
          <div class="dropzone__btns">
            <label class="pick-btn pick-btn--files" for="file-input">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 11V3.5A1.5 1.5 0 0 1 3.5 2h5L11 5v6a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 2 11Z" stroke="currentColor" stroke-width="1.2"/>
                <path d="M8.5 2v3.5H11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              Files
            </label>
            <label class="pick-btn pick-btn--folder" for="folder-input">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2H5l1.5 2H11.5A1.5 1.5 0 0 1 13 5.5V10a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 1 10V3.5Z" stroke="currentColor" stroke-width="1.2"/>
              </svg>
              Folder
            </label>
          </div>
        </div>
      </div>

      <!-- File inputs live OUTSIDE the dropzone so they don't overlap each other -->
      <input type="file" id="file-input"   class="hidden-input" multiple />
      <input type="file" id="folder-input" class="hidden-input" webkitdirectory multiple />

      <!-- ── Send Button ── -->
      <button class="send-btn" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 11V3M4 6l4-4 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 13.5h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span id="send-label">Send Files</span>
      </button>

      <!-- ── File Queue ── -->
      <section class="queue-section" id="queue-section">
        <div class="queue-section__header">
          <span class="queue-section__title">Queue</span>
          <div class="queue-section__actions">
            <span class="queue-section__count" id="queue-count">0 files</span>
            <button class="clear-btn" id="clear-btn" hidden>Clear</button>
          </div>
        </div>
        <ul class="file-list" id="file-list" role="list" aria-label="File transfer queue"></ul>
        <p class="empty-state" id="empty-state">Files you add will appear here.</p>
      </section>

    </div><!-- /.card -->

    <footer class="footer">
      <span>Peer-to-peer · No relay · No storage ·</span>
      <a href="https://sudipdahal1.com.np" class="footer__link" target="_blank" rel="noopener noreferrer">© Sudip Dahal</a>
    </footer>

  </main>

  <!-- Socket.IO from CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
