# Sochau Share — aapanel Nginx Proxy Config
# Place this file at:
#   /www/server/panel/vhost/nginx/proxy/share.sochau.cloud/sochau-backend.conf
#
# This proxies /socket.io/ and /health to the Node.js backend running on port 3000

location /socket.io/ {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;

    # WebSocket upgrade — REQUIRED for Socket.IO
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Long-lived WebSocket connections — DO NOT lower these
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 10s;

    proxy_buffering    off;
    proxy_cache        off;
}

location /health {
    proxy_pass         http://127.0.0.1:3000/health;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    access_log         off;
}
