# nginx/certbot-bootstrap.conf
# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 ONLY — used to get the first TLS certificate from Let's Encrypt.
# Replace with default.conf once certs exist.
#
# Usage:
#   1. Replace default.conf with this file temporarily
#   2. docker compose up -d frontend
#   3. Run certbot (see deploy guide)
#   4. Swap back to default.conf and restart
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name share.sochau.cloud;

    # ACME challenge — Let's Encrypt needs this to verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else — just serve the frontend for now (no redirect yet)
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}