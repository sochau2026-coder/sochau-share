# ─────────────────────────────────────────────────────────────────────────────
# Sochau Share — Nginx Configuration
#
# Topology:
#   Internet → Nginx :80/:443
#                ├── /           → frontend static files (served directly)
#                └── /signal/    → backend signaling server (Node :3000)
#
# Socket.IO requires:
#   - HTTP upgrade → WebSocket
#   - Sticky sessions (not needed here — single backend instance)
#   - Long-lived connections (proxy_read_timeout)
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ──────────────────────────────────────────────────────
# 10 MB shared memory → ~160 000 IP entries
limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=static:10m rate=300r/m;
limit_conn_zone $binary_remote_addr  zone=conn:10m;

# ── Upstream: Node.js signaling server ──────────────────────────────────────
upstream signaling_backend {
    server backend:3000;

    # Keep connections alive to upstream (avoids TCP handshake per request)
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name share.sochau.cloud;

    # Allow ACME challenge for Certbot / Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name share.sochau.cloud;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/share.sochau.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/share.sochau.cloud/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # Content-Security-Policy — tightened for a file-transfer app
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' https://cdn.socket.io https://fonts.googleapis.com; \
         style-src  'self' https://fonts.googleapis.com https://fonts.gstatic.com 'unsafe-inline'; \
         font-src   'self' https://fonts.gstatic.com; \
         connect-src 'self' wss://share.sochau.cloud https://stun.l.google.com turn:openrelay.metered.ca; \
         img-src    'self' data: blob:; \
         object-src 'none'; \
         base-uri   'self';" always;

    # ── Connection limits ────────────────────────────────────────────────────
    limit_conn conn 20;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml+rss
        image/svg+xml;

    # ── Frontend root ────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── Static assets — aggressive caching ──────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        limit_req zone=static burst=60 nodelay;
        expires           1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Socket.IO proxy (WebSocket upgrade) ──────────────────────────────────
    # The signaling server is mounted at /socket.io/ on the backend.
    # We proxy the entire /socket.io/ path so Socket.IO client auto-discovery works.
    location /socket.io/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://signaling_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Forward real client IP to the Node server
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time signaling
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Health check proxy (used by Docker / load balancer) ──────────────────
    location /health {
        proxy_pass        http://signaling_backend/health;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
        access_log        off;
    }

    # ── SPA fallback: any path without a dot → index.html ────────────────────
    # This enables room URLs like /sale1, /abc123, etc.
    location / {
        limit_req zone=static burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden files (.git, .env, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sochau-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/sochau-error.log  warn;
}