# ─────────────────────────────────────────────────────────────────────────────
# nginx/local.conf — HTTP only, no TLS, no domain required
# Used exclusively for local development via docker-compose.local.yml
# ─────────────────────────────────────────────────────────────────────────────

upstream signaling_backend {
    server backend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Static files ──────────────────────────────────────────────────────────
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Socket.IO WebSocket proxy ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://signaling_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_cache         off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://signaling_backend/health;
        access_log off;
    }

    # ── SPA fallback — room URLs like /testroom ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}