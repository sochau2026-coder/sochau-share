# coturn configuration for sochau-share
# Auth mode: long-term credentials (lt-cred-mech)
# This MUST match the frontend ice-config.js credentials exactly.

# Listening port
listening-port=3478
tls-listening-port=5349

# External IP — REPLACE with your VPS public IP (required for Docker/NAT)
external-ip=YOUR_SERVER_PUBLIC_IP

# Realm
realm=share.sochau.cloud

# Long-term credential mechanism (matches frontend username/credential)
lt-cred-mech
user=sochau:a4dc038aa26d6469847ba0b32ab752fb82f83d23a572e4e19d2334f3dfb40691

# Certificate (required for turns:// TLS - point to your actual certs)
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem

# Log settings
log-file=/var/log/turnserver.log
syslog

# Enable verbose logging for debugging (disable in production)
# verbose

# Allow insecure loops (for WebRTC)
no-loopback-peers
no-multicast-peers

# Min/max port for relay (WebRTC uses this range)
# Ensure your VPS firewall opens UDP 49152-65535
min-port=49152
max-port=65535
